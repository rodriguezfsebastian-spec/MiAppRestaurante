<div class="main-container">
  <!-- Barra de búsqueda del mockup -->
  <input type="text" class="search-bar" placeholder="Search">
  
  <h2 class="section-title">Restaurantes favoritos</h2>

  <!-- Grid de tarjetas blancas -->
  @for (item of items; track item.id) {
    <div class="restaurant-card" (click)="irAReservar()">
      <h3>Restaurante {{item.id}}</h3>
      <p>{{item.texto}}</p>
    </div>
  }
</div>
