<div class="container mt-4 main-container">
  <div class="mb-4">
    <div class="input-group search-container">
      <span class="input-group-text bg-transparent border-end-0">🔍</span>
      <input type="text" class="form-control border-start-0 search-bar-bootstrap" placeholder="Search">
    </div>
  </div>
  
  <h2 class="section-title h5 mb-3">Restaurantes favoritos</h2>

  <div class="row">
    @for (item of items; track item.id) {
      <div class="col-12 col-md-6 mb-3">
        <div class="card restaurant-card shadow-sm h-100" (click)="irADetalle(item.id)">
          <div class="card-body d-flex align-items-center">
            <span class="me-3" style="font-size: 2rem;">{{ item.emoji }}</span>
            <div>
              <h3 class="card-title h6 fw-bold mb-1">{{ item.nombre }}</h3>
              <p class="card-text text-muted small m-0">{{ item.texto }}</p>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
