<div class="login-screen">
  <div class="brand-header">
    <span style="font-size: 50px;">🥘</span>
    <h2>THE FOOD</h2>
  </div>

  <div class="form-body">
    <div class="form-group">
      <label>Correo Electrónico</label>
      <input type="email" placeholder="example@email.com">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" placeholder="**********">
    </div>

    <button class="btn-primary" (click)="entrar()">Iniciar Sesión</button>
    <button class="btn-secondary">Registrarse</button>
  </div>
  <div class="d-flex justify-content-center align-items-center mt-4 google-btn">
    <span style="font-size: 3rem;">G</span>
    <span>Continuar con Google</span>
  </div>
</div>
