<div class="login-screen">
  <div class="brand-header">
    <h2>THE EXOTIC RESTAURANT</h2>
    <p>QUE EL EXOTISMO NO TAPE LA REALIDAD.</p>
  </div>

  <div class="form-body">
    <div class="form-group">
      <label>Correo Electrónico</label>
      <input type="email" placeholder="example@email.com">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" placeholder="**********">
    </div>

    <button class="btn-primary" (click)="entrar()">Iniciar Sesión</button>
    <button class="btn-secondary">Registrarse</button>
  </div>
  <div class="d-flex justify-content-center align-items-center mt-4 google-btn">
    <span>Continuar con <span style="font-size: 2rem;">G</span>oogle</span>
  </div>
</div>
